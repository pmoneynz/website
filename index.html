<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting to About | P-Money</title>
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="refresh" content="0;url=/about">
  <link rel="canonical" href="https://pmoneymusic.com/about">
  <script>
    (function () {
      var destination = "/about" + window.location.search + window.location.hash;
      var link = document.getElementById("redirect-link");
      if (link) {
        link.href = destination;
        link.textContent = destination;
      }
      window.location.replace(destination);
    })();
  </script>
</head>
<body>
  <p>Redirecting to <a id="redirect-link" href="/about">/about</a>.</p>
</body>
</html>
