<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting to quickloopspro.com</title>
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="refresh" content="0;url=https://quickloopspro.com/">
  <link rel="canonical" href="https://quickloopspro.com/">
  <script>
    (function () {
      var legacyBase = "/quickloopspro";
      var targetOrigin = "https://quickloopspro.com";
      var path = window.location.pathname;
      if (path.indexOf(legacyBase) === 0) {
        path = path.slice(legacyBase.length) || "/";
      }
      path = path.replace(/\/index\.html$/i, "/");
      if (path.charAt(0) !== "/") {
        path = "/" + path;
      }
      var destination = targetOrigin + path + window.location.search + window.location.hash;
      var link = document.getElementById("redirect-link");
      if (link) {
        link.href = destination;
        link.textContent = destination;
      }
      window.location.replace(destination);
    })();
  </script>
</head>
<body>
  <p>Redirecting to <a id="redirect-link" href="https://quickloopspro.com/">https://quickloopspro.com/</a>.</p>
</body>
</html>
